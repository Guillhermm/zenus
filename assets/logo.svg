<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <defs>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!--
    Z constellation, transparent background.
    Nodes:
      A = (18,  18)   top-left
      B = (142, 18)   top-right
      C = (52,  80)   mid-left  (on diagonal)
      D = (108, 80)   mid-right (on diagonal)
      E = (18,  142)  bottom-left
      F = (142, 142)  bottom-right
  -->

  <!-- Primary Z edges -->
  <line x1="18"  y1="18"  x2="142" y2="18"  stroke="#3b82f6" stroke-width="2"   opacity="0.55"/>
  <line x1="142" y1="18"  x2="18"  y2="142" stroke="#3b82f6" stroke-width="2"   opacity="0.55"/>
  <line x1="18"  y1="142" x2="142" y2="142" stroke="#3b82f6" stroke-width="2"   opacity="0.55"/>

  <!-- Secondary / neural cross-edges -->
  <line x1="18"  y1="18"  x2="52"  y2="80"  stroke="#1d4ed8" stroke-width="1.2" opacity="0.35"/>
  <line x1="142" y1="18"  x2="108" y2="80"  stroke="#1d4ed8" stroke-width="1.2" opacity="0.35"/>
  <line x1="52"  y1="80"  x2="18"  y2="142" stroke="#1d4ed8" stroke-width="1.2" opacity="0.35"/>
  <line x1="108" y1="80"  x2="142" y2="142" stroke="#1d4ed8" stroke-width="1.2" opacity="0.35"/>
  <line x1="52"  y1="80"  x2="108" y2="80"  stroke="#1d4ed8" stroke-width="1.2" opacity="0.25"/>

  <!-- Nodes -->
  <g filter="url(#softglow)">
    <!-- Corner nodes — large -->
    <circle cx="18"  cy="18"  r="8" fill="#1e3a8a"/>
    <circle cx="18"  cy="18"  r="4.5" fill="#60a5fa"/>

    <circle cx="142" cy="18"  r="8" fill="#1e3a8a"/>
    <circle cx="142" cy="18"  r="4.5" fill="#60a5fa"/>

    <circle cx="18"  cy="142" r="8" fill="#1e3a8a"/>
    <circle cx="18"  cy="142" r="4.5" fill="#60a5fa"/>

    <circle cx="142" cy="142" r="8" fill="#1e3a8a"/>
    <circle cx="142" cy="142" r="4.5" fill="#60a5fa"/>

    <!-- Mid-diagonal nodes — smaller -->
    <circle cx="52"  cy="80"  r="5.5" fill="#1e3a8a"/>
    <circle cx="52"  cy="80"  r="3"   fill="#93c5fd"/>

    <circle cx="108" cy="80"  r="5.5" fill="#1e3a8a"/>
    <circle cx="108" cy="80"  r="3"   fill="#93c5fd"/>
  </g>
</svg>
